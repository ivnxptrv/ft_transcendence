# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; 
# this version uses a timestamp for better ordering.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to include in the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during 
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without 
# a source .py file to be detected as revisions in the 
# versions/ directory
# sourceless = false

# search path for versions; defaults to migrations/versions
# version_locations = %(here)s/bar:%(here)s/baz:migrations/versions

# version_path_separator = :

# set to 'true' to enable behavior where multiple 
# version paths are searched for a single revision
# version_path_separator = os

# the sqlalchemy.url is required by Alembic, but since we 
# override it in env.py using env variables, we leave it generic here.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# post_write_hooks allow scripts to run after a 'revision' 
# is generated. For example, running 'black' for formatting:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = REVISION_SCRIPT

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S