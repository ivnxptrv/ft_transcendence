services:
  identity:
    build: .
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "4",
      ]
    container_name: identity
    ports:
      - "4010:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=identity_user
      - DB_NAME=identity
      - INTERACTION_HOST=interaction
      - INTERACTION_PORT=8000
      - LEDGER_HOST=ledger
      - LEDGER_PORT=8000
    volumes:
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    restart: always
    secrets:
      - postgres_identity_pass
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  postgres_identity_pass:
    file: ../../secrets/postgres_identity_pass
