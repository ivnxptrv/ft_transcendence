services:
  identity:
    build: .
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    labels:
      co.elastic.logs/enabled: true
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "4",
      ]
    container_name: identity
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=identity_user
      - DB_NAME=identity
      - JWT_PRIVATE_KEY_PATH=/run/secrets/identity_private
      - WEB_HOST=web
      - WEB_PORT=3000
      - IDENTITY_HOST=identity
      - IDENTITY_PORT=8000
      - INTERACTION_HOST=interaction
      - INTERACTION_PORT=8000
      - LEDGER_HOST=ledger
      - LEDGER_PORT=8000
      - SEMANTIC_HOST=semantic
      - SEMANTIC_PORT=8000
      - ADMIN_EMAIL=admin@vekko.local
    volumes:
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://localhost:8000/health'').status==200 else 1)" || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 50
      start_period: 40s
    secrets:
      - postgres_identity_pass
      - identity_private
      - identity_admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  postgres_identity_pass:
    file: ../../secrets/postgres_identity_pass
  identity_private:
    file: ../../secrets/identity_private
  identity_admin:
    file: ../../secrets/identity_admin
