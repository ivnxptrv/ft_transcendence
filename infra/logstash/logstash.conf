input {
  beats {
    port => "${BEATS_PORT}"
  }
}

filter {
  # If it's an Nginx log, remove the duplicate field so the ES pipeline doesn't crash
  if [event][module] == "nginx" {
    mutate {
      remove_field => [ "[event][original]" ]
    }
  }
}

output {
  # Scenario A: The log HAS a pipeline (e.g., Nginx module logs)
  if [@metadata][pipeline] {
    elasticsearch {
      hosts => ["http://${ELASTICSEARCH}"]
      index => "%{[@metadata][beat]}-%{[@metadata][version]}"
      action => "create"
      pipeline => "%{[@metadata][pipeline]}"
    }
  } 
  # Scenario B: The log DOES NOT have a pipeline (e.g., Prometheus or Filebeat logs)
  else {
    elasticsearch {
      hosts => ["http://${ELASTICSEARCH}"]
      index => "%{[@metadata][beat]}-%{[@metadata][version]}"
      action => "create"
      # Notice we completely removed the 'pipeline' line here!
    }
  }
}
