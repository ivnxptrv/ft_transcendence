services:
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash
    labels:
      co.elastic.logs/enabled: true
      co.elastic.logs/module: "logstash"
      co.elastic.logs/fileset.stdout: "log"
      co.elastic.logs/fileset.stderr: "log"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      XPACK_MONITORING_ENABLED: "false" # This stops the error messages
      ELASTICSEARCH: "mitmproxy:8200"
      BEATS_PORT: "5044"
    healthcheck:
      # Pings the built-in Logstash API to verify the engine is running
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9600/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # Gives the JVM time to boot before counting failures
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

      # ELASTICSEARCH: "elasticsearch:9200"
