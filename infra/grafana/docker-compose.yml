services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_METRICS_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1487019762083954748/WYQXjH8ZHKOmYnMjl5h968lLjBcS7Ur8kC2zdw-034pHNHcrX0fYHDquka44T6WOEecy
      - PROMETHEUS_UID=prometheus # Match this to your datasource uid
    volumes:
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    secrets:
      - grafana_password
    labels:
      - "prometheus_scrape=true"
      - "prometheus_port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 20s

secrets:
  grafana_password:
    file: ../../secrets/grafana_password
