global:
  scrape_interval: 15s
  evaluation_interval: 15s # How often Prometheus checks the alert rules
# scrape_configs:
#   - job_name: "prometheus"
#     static_configs:
#       - targets: ["prometheus:9090"]

#   - job_name: "node-exporter"
#     static_configs:
#       - targets: ["node-exporter:9100"]
rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "docker-containers"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Use the mounted socket

    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep
      - source_labels:
          [__address__, __meta_docker_container_label_prometheus_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      # NEW: honor a per-container metrics path label
      - source_labels: [__meta_docker_container_label_prometheus_path]
        regex: (.+)
        action: replace
        target_label: __metrics_path__
        replacement: $1
      - source_labels: [__meta_docker_container_name]
        target_label: instance
