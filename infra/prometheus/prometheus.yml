global:
  scrape_interval: 15s
  evaluation_interval: 15s # How often Prometheus checks the alert rules
# scrape_configs:
#   - job_name: "prometheus"
#     static_configs:
#       - targets: ["prometheus:9090"]

#   - job_name: "node-exporter"
#     static_configs:
#       - targets: ["node-exporter:9100"]
rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "docker-containers"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Use the mounted socket

    relabel_configs:
      # 1. Only keep containers that have the label "prometheus_scrape=true"
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep

      # 2. Use the "prometheus_port" label to know which port to scrape
      - source_labels:
          [__address__, __meta_docker_container_label_prometheus_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

      # 3. Use the container name as the "instance" label in Grafana
      - source_labels: [__meta_docker_container_name]
        target_label: instance
