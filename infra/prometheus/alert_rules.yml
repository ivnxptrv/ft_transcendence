# alert_rules.yml
groups:
  - name: postgres_alerts
    rules:
      # Alert 1: Is the database down?
      - alert: PostgresInstanceDown
        # pg_up returns 1 if healthy, 0 if down
        expr: pg_up == 0
        # Wait 1 minute before firing to avoid false positives during normal restarts
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down (instance {{ $labels.instance }})"
          description: "The postgres-exporter cannot connect to the database. Your backend APIs are likely failing."

      # Alert 2: Are we running out of connections?
      - alert: PostgresHighConnections
        # Triggers if more than 80% of allowed connections are in use
        expr: sum(pg_stat_activity_count) / sum(pg_settings_max_connections) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High connection count on {{ $labels.instance }}"
          description: "PostgreSQL is using over 80% of its max connections. Check for connection leaks in your microservices."
