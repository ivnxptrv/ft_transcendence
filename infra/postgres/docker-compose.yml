services:
  postgres:
    image: postgres:15
    container_name: postgres
    labels:
      co.elastic.logs/enabled: true
      co.elastic.logs/module: "postgresql"
      co.elastic.logs/fileset.stdout: "log"
      co.elastic.logs/fileset.stderr: "log"
    volumes:
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_db_root_password
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    secrets:
      - postgres_db_root_password
      - postgres_exporter_pass
      - postgres_identity_pass
      - postgres_ledger_pass
      - postgres_semantic_pass
      - postgres_interaction_pass
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      prometheus_scrape: true
      prometheus_port: 9187
      co.elastic.logs/enabled: true
    environment:
      - DATA_SOURCE_URI=postgres:5432/postgres?sslmode=disable
      - DATA_SOURCE_USER=postgres_exporter
      - DATA_SOURCE_PASS_FILE=/run/secrets/postgres_exporter_pass
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=true
    secrets:
      - postgres_exporter_pass
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  postgres_db_root_password:
    file: ../../secrets/postgres_db_root_password
  postgres_exporter_pass:
    file: ../../secrets/postgres_exporter_pass
  postgres_identity_pass:
    file: ../../secrets/postgres_identity_pass
  postgres_ledger_pass:
    file: ../../secrets/postgres_ledger_pass
  postgres_semantic_pass:
    file: ../../secrets/postgres_semantic_pass
  postgres_interaction_pass:
    file: ../../secrets/postgres_interaction_pass

volumes:
  postgres_data:
