# -----------------------------
# PostgreSQL Configuration for Filebeat
# -----------------------------

# Connection settings
listen_addresses = '*'

# --- LOGGING SECTION ---
# Enable logging
logging_collector = off  # Keep off for Docker so logs go to stdout/stderr
log_destination = 'stderr'

# This prefix is EXACTLY what the Filebeat Postgres module expects:
# %m = timestamp, %p = process id, %q = stop if not a session, %u = user, %d = database
log_line_prefix = '%m [%p] %q%u@%d '

# What to log
log_statement = 'all'         # Log all queries (great for testing)
log_duration = on            # Log how long queries take
log_connections = on         # Log when users log in
log_disconnections = on      # Log when users log out
log_min_messages = info      # Log level

shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
