services:
  nginx:
    image: nginx:1.28.1
    container_name: nginx
    secrets:
      - htpasswd
      - server.key
    volumes:
      - ./default.conf:/etc/nginx/nginx.conf:ro
      - ./server.crt:/etc/nginx/ssl/server.crt:ro
    ports:
      - "443:443"
    labels:
      co.elastic.logs/enabled: true
      co.elastic.logs/module: "nginx"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsk https://localhost:443/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 50
      start_period: 20s
    depends_on:
      kibana:
        condition: service_healthy
      grafana:
        condition: service_healthy
      web:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      filebeat:
        condition: service_healthy

secrets:
  htpasswd:
    file: ../../secrets/htpasswd
  server.key:
    file: ../../secrets/server.key
