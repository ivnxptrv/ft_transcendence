events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    # If mime.types is missing or broken, this serves as a fallback
    default_type  application/octet-stream;

    # Rate limit zone: 10 requests/second per client IP, 10MB memory for state
    limit_req_zone $binary_remote_addr zone=public_api:10m rate=10r/s;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /run/secrets/server.key;

        # 1. Ensure this path contains your index.html AND assets folder
        root /usr/share/nginx/html;
        index index.html;

        # # 2. Handle the main web app and Routing
        # location / {
        #     proxy_pass http://web:3000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     # Crucial: ensure authorization headers are passed
        #     proxy_set_header Cookie $http_cookie;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Forwarded-Host  $host;
        #     proxy_redirect ~^http://[^/]+:3000/(.*)$ https://localhost/$1;
        # }
		location / {
			proxy_pass http://web:3000;

			proxy_set_header Host $http_host;
			proxy_set_header X-Forwarded-Host $http_host;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Port $server_port;

			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header Cookie $http_cookie;

			proxy_redirect off;
		}

        location /api/v1/public/ {
            limit_req zone=public_api burst=20 nodelay;

            # same proxy setup as your location /
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location = /grafana {
            return 301 $scheme://$http_host/grafana/;
        }
        location ^~ /grafana/ {
            # 1. Basic Auth
            auth_basic "Restricted Access";
            auth_basic_user_file /run/secrets/htpasswd;
            proxy_set_header Authorization "";
            proxy_pass http://grafana:3000;

            # 3. Essential Headers for Grafana
            proxy_set_header Host $http_host; # Includes the port (8080)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /prometheus {
            return 301 $scheme://$http_host/prometheus/;
        }
        location ^~ /prometheus/ {
            auth_basic "Metrics Access";
            auth_basic_user_file /run/secrets/htpasswd;

            proxy_pass http://prometheus:9090/; # Default Prometheus port

            proxy_set_header Host $http_host; # Includes the port (8080)
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /kibana {
            return 301 $scheme://$http_host/kibana/;
        }
        location ^~ /kibana/ {
            auth_basic "Log Access";
            auth_basic_user_file /run/secrets/htpasswd;

            proxy_pass http://kibana:5601; # Default Kibana port


            proxy_set_header Host $http_host; # Includes the port (8080)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        }
    }
}
