events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    # If mime.types is missing or broken, this serves as a fallback
    default_type  application/octet-stream;

    server {
        listen 80;
        # 1. Ensure this path contains your index.html AND assets folder
        root /usr/share/nginx/html;
        index index.html;

        # 2. Handle the main Vue App and Routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 3. Handle JavaScript specifically with strict MIME types
        location ~* \.js$ {
            # This is the standard way to define the type inside a block
            include /etc/nginx/mime.types;
            default_type application/javascript;
            
            expires 1y;
            add_header Cache-Control "public, no-transform";
            # Critical: prevent it from falling back to index.html
            try_files $uri =404;
        }

        # 4. Handle other static assets
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location /grafana/ {
            # 1. Basic Auth
            auth_basic "Restricted Access";
            auth_basic_user_file /run/secrets/htpasswd;

            # 2. Proxy Settings
            # 'grafana' should match the service name in your docker-compose.yml
            proxy_pass http://grafana:3000/; 
            
            # 3. Essential Headers for Grafana
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
