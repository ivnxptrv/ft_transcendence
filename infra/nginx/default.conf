events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    # If mime.types is missing or broken, this serves as a fallback
    default_type  application/octet-stream;

    server {
        listen 443 ssl;
        server_name localhost;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /run/secrets/server.key;

        # 1. Ensure this path contains your index.html AND assets folder
        root /usr/share/nginx/html;
        index index.html;

        # 2. Handle the main web app and Routing
        location / {
            proxy_pass http://web:3000; 
        }

