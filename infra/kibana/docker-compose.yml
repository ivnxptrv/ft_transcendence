services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    labels:
      co.elastic.logs/enabled: true
      co.elastic.logs/module: "kibana"
      co.elastic.logs/fileset.stdout: "log"
      co.elastic.logs/fileset.stderr: "log"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
      - ELASTICSEARCH_REQUESTTIMEOUT=9000000
    ports:
      - 5601:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:5601/kibana/api/status | grep -q ''"level":"available"'' || exit 1',
        ]
      interval: 3s
      timeout: 2s
      retries: 5000 # Give Kibana plenty of time to boot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
