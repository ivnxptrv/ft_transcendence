openapi: 3.0.3
info:
  title: Identity Service
  version: 1.0.0
paths:
  /status:
    get:
      summary: Check if the service is alive
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: "identity-service"
                  status:
                    type: string
                    example: "online"
