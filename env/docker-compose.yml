networks:
  frontend:
    name: frontend
    driver: bridge
  backend:
    name: backend
    driver: bridge

volumes:
  database:
    name: database
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../${VOLUMES_PATH}/database/

secrets:
  db_password:
    file: ../secrets/dev/db_password.txt
