  # --- WALLET SERVICE ---
  wallet:
    build: ./services/wallet
    profiles: ["wallet"]
    ports: ["8082:8080"]

  wallet-mock:
    image: stoplight/prism:4
    profiles: ["auth", "interaction"]
    command: mock -h 0.0.0.0 /openapi/openapi.yaml
    volumes: ["./services/wallet:/openapi:ro"]
    ports: ["8082:4010"]
